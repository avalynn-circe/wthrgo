name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & component tests
        run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  build:
    name: Expo prebuild check
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Expo doctor
        run: npx expo-doctor

      - name: Verify Metro bundler config
        run: npx expo export --platform all --dump-sourcemap --output-dir .expo-build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  # Notes:
  # - EAS Build (full iOS/Android binary builds) runs separately via `eas build`,
  #   not in this CI. It costs build minutes; we don't want it on every PR.
  # - Adding a coverage threshold gate (e.g., fail if line coverage < 70%) is a
  #   follow-on once we have enough tests to make the threshold meaningful.
  #   See traceability.md and CLAUDE.md.
